name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: lathe
            asset_name: lathe-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: lathe
            asset_name: lathe-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lathe
            asset_name: lathe-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lathe.exe
            asset_name: lathe-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
      - name: Test
        run: cargo test --workspace --target ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p lathe-cli
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/${{ matrix.asset_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
