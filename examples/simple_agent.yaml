name: Example Lathe Graph
nodes:
- !Start
  id: start-node
  label: lathe::nodes::start
- !LLMNode
  id: llm-node
  label: Simple Assistant LLM Node
  provider: LMStudio
  model: qwen2.5-0.5b-instruct-quantized
  system_prompt: You are a helpful assistant
  input_key: /message
  output_key: /output_message
  provider_config_id: my-model
- !End
  id: end-node
  label: lathe::nodes::end
  out_pointers:
  - /output_message
connections:
- from:
    node_id: start-node
    name: to Simple Assistant LLM Node
  to:
    node_id: llm-node
    name: from lathe::nodes::start
- from:
    node_id: llm-node
    name: to lathe::nodes::end
  to:
    node_id: end-node
    name: from Simple Assistant LLM Node
provider_configs:
  my-model:
    id: my-model
    base_url: null
    api_key: null
    provider: LMStudio
